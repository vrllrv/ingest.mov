name: Refresh fest-map data

on:
  schedule:
    - cron: '0 6,18 * * *' # twice daily, 06:00 & 18:00 UTC
  workflow_dispatch: {} # manual "Run workflow" button

concurrency:
  group: refresh-festmap
  cancel-in-progress: false

permissions:
  contents: write # allow committing regenerated data.json + geocache back

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Read the public "Future Festivals" sheet (CSV), parse + geocode -> data.json
      - name: Ingest sheet
        run: npm run ingest

      # Push the regenerated asset live to Cloudflare
      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      # Persist data.json + geocode cache so the next run reuses coordinates
      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/fest-map/data.json public/fest-map/data-ff.json ingest/geocache.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: refresh fest-map data [skip ci]"
            git push
          fi
