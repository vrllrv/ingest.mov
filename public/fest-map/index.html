<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>Future Festivals — World Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --bg:#0b0e13; --panel:rgba(17,21,28,.86); --panel-solid:#11151c;
    --line:rgba(255,255,255,.10); --line2:rgba(255,255,255,.16);
    --txt:#e8ecf2; --muted:#8a93a3; --accent:#f2c14e; --grey:#5b6472;
    --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
    --sans:'IBM Plex Sans',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);font-family:var(--sans);overflow:hidden}
  #map{position:absolute;inset:0;background:var(--bg)}
  .leaflet-container{background:var(--bg);font-family:var(--sans)}
  .leaflet-popup-content-wrapper{background:var(--panel-solid);color:var(--txt);border:1px solid var(--line2);border-radius:10px;box-shadow:0 12px 40px rgba(0,0,0,.55)}
  .leaflet-popup-tip{background:var(--panel-solid);border:1px solid var(--line2)}
  .leaflet-popup-content{margin:13px 15px;line-height:1.45}
  .leaflet-tooltip{background:var(--panel-solid);border:1px solid var(--line2);color:var(--txt);font-family:var(--mono);font-size:11px;box-shadow:none}
  .leaflet-tooltip:before{display:none}
  .leaflet-bar a, .leaflet-control-zoom a{background:var(--panel-solid);color:var(--txt);border-color:var(--line)}
  .leaflet-bar a:hover{background:#1b212b}

  /* ---- top console ---- */
  #hud{position:absolute;z-index:1000;top:0;left:0;right:0;
    background:linear-gradient(180deg,rgba(8,10,14,.94),rgba(8,10,14,.62) 70%,transparent);
    padding:12px 14px 22px;pointer-events:none}
  #hud .row{display:flex;flex-wrap:wrap;gap:8px 10px;align-items:center;pointer-events:auto}
  .brand{display:flex;flex-direction:column;margin-right:6px}
  .brand b{font-family:var(--mono);font-weight:600;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--txt)}
  .brand span{font-family:var(--mono);font-size:10.5px;color:var(--muted);letter-spacing:.04em}
  .seg{display:flex;border:1px solid var(--line2);border-radius:9px;overflow:hidden;background:var(--panel)}
  .seg button{appearance:none;border:0;background:transparent;color:var(--muted);font-family:var(--mono);
    font-size:11px;letter-spacing:.04em;padding:8px 11px;cursor:pointer;white-space:nowrap}
  .seg button.on{background:var(--accent);color:#1a1407;font-weight:600}
  .ctl{background:var(--panel);border:1px solid var(--line2);border-radius:9px;color:var(--txt);
    font-family:var(--mono);font-size:11.5px;padding:8px 10px;outline:none}
  .ctl::placeholder{color:var(--muted)}
  select.ctl{max-width:46vw}
  .chk{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line2);
    border-radius:9px;padding:7px 10px;font-family:var(--mono);font-size:11px;color:var(--muted);cursor:pointer;user-select:none}
  .chk input{accent-color:var(--accent);margin:0}
  .count{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto;white-space:nowrap}
  .count b{color:var(--accent)}

  /* ---- legend ---- */
  #legend{position:absolute;z-index:1000;left:14px;bottom:16px;background:var(--panel);
    border:1px solid var(--line2);border-radius:11px;padding:11px 13px 12px;backdrop-filter:blur(8px);max-width:min(330px,86vw)}
  #legend .lt{font-family:var(--mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  #legend .lt b{color:var(--txt)}
  .bar{height:11px;border-radius:6px;background:linear-gradient(90deg,
    hsl(0 85% 52%),hsl(40 85% 52%),hsl(75 80% 50%),hsl(120 70% 45%));border:1px solid var(--line)}
  .ends{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:5px}
  .ends span b{color:var(--txt);font-weight:500}
  .glegend{display:flex;align-items:center;gap:7px;margin-top:9px;font-family:var(--mono);font-size:10.5px;color:var(--muted)}
  .dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto}

  /* popup content */
  .pop b.nm{font-size:13.5px;display:block;margin-bottom:5px;line-height:1.3}
  .pop .meta{font-family:var(--mono);font-size:11px;color:var(--muted);display:grid;grid-template-columns:auto 1fr;gap:2px 9px;margin:6px 0}
  .pop .meta i{color:var(--muted);font-style:normal}
  .pop .meta s{color:var(--txt);text-decoration:none}
  .pop .tag{display:inline-block;font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;
    padding:2px 7px;border-radius:20px;border:1px solid var(--line2);color:var(--muted);margin-top:4px}
  .pop .warn{color:#f0a35e}
  .pop a.link{display:inline-block;margin-top:9px;font-family:var(--mono);font-size:11px;color:var(--accent);text-decoration:none;border-bottom:1px solid rgba(242,193,78,.4)}
  /* embedded-map country labels + hover */
  .cty{font-family:var(--mono);font-size:10px;letter-spacing:.05em;color:rgba(180,192,208,.55);
    text-shadow:0 1px 3px #000,0 0 2px #000;white-space:nowrap;pointer-events:none;
    text-align:center;text-transform:uppercase}
  .leaflet-tooltip.ctyhover{background:var(--panel-solid);border:1px solid var(--line2);color:var(--txt);
    font-family:var(--mono);font-size:11px;letter-spacing:.03em;padding:3px 8px}
  @media (max-width:640px){
    .brand{margin-right:0}
    .count{margin-left:0}
    select.ctl{max-width:40vw}
  }
</style>
</head>
<body>
<div id="map"></div>

<div id="hud">
  <div class="row">
    <div class="brand"><b>Future Festivals</b><span id="sub">global submission map</span></div>
    <div class="seg" id="mode">
      <button data-m="start" class="on">Festival date</button>
      <button data-m="deadline">Submission deadline</button>
    </div>
    <input id="q" class="ctl" placeholder="search name…" autocomplete="off"/>
    <select id="country" class="ctl"></select>
    <div class="seg" id="horizon" aria-label="starts within">
      <button data-d="" class="on">Any time</button>
      <button data-d="30">≤30d</button>
      <button data-d="60">≤60d</button>
      <button data-d="90">≤90d</button>
    </div>
    <label class="chk"><input type="checkbox" id="showInactive"/> show past / closed</label>
    <div class="count" id="count"></div>
  </div>
</div>

<div id="legend">
  <div class="lt">Color = <b id="legmode">festival date</b> · sooner → later</div>
  <div class="bar"></div>
  <div class="ends"><span>SOON <b id="legmin"></b></span><span><b id="legmax"></b> LATER</span></div>
  <div class="glegend"><span class="dot" style="background:var(--grey)"></span> past event / no date — inactive</div>
</div>

const TODAY = new Date('2026-05-31T00:00:00');
const DAY = 86400000;
const fmt = d => new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
const fmtShort = d => new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'});

const map = L.map('map',{worldCopyJump:true,zoomControl:true,preferCanvas:true,minZoom:2,maxBoundsViscosity:.6})
  .setView([28,8],2.4);

// --- country geography drawn from embedded GeoJSON (no external tiles) ---
const countryLayer = L.geoJSON(GEO,{
  style:{color:'#33404f',weight:.8,fillColor:'#161c25',fillOpacity:1,opacity:1},
  onEachFeature:(feat,lyr)=>{
    const nm=feat.properties.name;
    lyr.bindTooltip(nm,{sticky:true,direction:'top',className:'ctyhover'});
    lyr.on('mouseover',()=>lyr.setStyle({color:'#5a6b80',weight:1.2,fillColor:'#1c2531'}));
    lyr.on('mouseout',()=>countryLayer.resetStyle(lyr));
  }
}).addTo(map);

// permanent name labels, shown only when zoomed into a region (>=z4)
function centroid(geom){
  let best=null,bn=0;
  const rings = geom.type==='Polygon'? [geom.coordinates[0]] : geom.coordinates.map(p=>p[0]);
  rings.forEach(r=>{ if(r.length>bn){bn=r.length;best=r;} });
  let x=0,y=0; best.forEach(p=>{x+=p[0];y+=p[1];}); return [y/best.length,x/best.length];
}
const labelLayer=L.layerGroup();
GEO.features.forEach(f=>{
  const c=centroid(f.geometry);
  L.marker(c,{interactive:false,icon:L.divIcon({className:'cty',html:f.properties.name,iconSize:[90,14],iconAnchor:[45,7]})}).addTo(labelLayer);
});
function toggleLabels(){ if(map.getZoom()>=4){ if(!map.hasLayer(labelLayer)) labelLayer.addTo(map);} else if(map.hasLayer(labelLayer)) map.removeLayer(labelLayer); }
map.on('zoomend',toggleLabels); toggleLabels();

// active = real upcoming event
DATA.forEach(f=>{ f._active = !f.inactive; });

function dateFor(f,mode){
  if(!f._active) return null;
  const v = mode==='start' ? f.start : f.deadline;
  return v ? new Date(v+'T00:00:00') : null;
}
// gradient anchor: today -> furthest active date (per mode), stable across filters
function maxDate(mode){
  let mx = TODAY.getTime();
  DATA.forEach(f=>{ const d=dateFor(f,mode); if(d) mx=Math.max(mx,d.getTime()); });
  return mx;
}
function color(f,mode,mx){
  const d = dateFor(f,mode);
  if(!d) return '#5b6472';
  let t = (d.getTime()-TODAY.getTime())/(mx-TODAY.getTime());
  t = Math.max(0,Math.min(1,t));
  return `hsl(${(t*120).toFixed(0)} 82% 52%)`;
}

const layer = L.layerGroup().addTo(map);
let MODE='start';
let HORIZON=null;

// country dropdown
const sel=document.getElementById('country');
const countries=[...new Set(DATA.map(f=>f.country))].sort();
sel.innerHTML='<option value="">All countries ('+DATA.length+')</option>'+
  countries.map(c=>`<option value="${c}">${c} (${DATA.filter(f=>f.country===c).length})</option>`).join('');

function popup(f){
  const ev = f.start ? fmt(f.start)+(f.end&&f.end!==f.start?' – '+fmt(f.end):'') : '—';
  const dl = f.deadline ? fmt(f.deadline) : (f.opens?('opens '+f.opens.replace(/^Opens\s*/i,'')):'—');
  let days = f.start ? Math.round((new Date(f.start+'T00:00:00')-TODAY)/DAY) : null;
  const dtxt = days==null? '' : (days<0? `${-days} days ago` : `in ${days} days`);
  const warn = (f.warn&&f.warn.length)? `<div class="tag warn">⚠ ${f.warn.join(' · ')}</div>`:'';
  const prec = f.prec==='country' ? `<div class="tag">approx · country-level</div>`:'';
  return `<div class="pop"><b class="nm">${f.name}</b>
    <div class="meta">
      <i>Festival</i><s>${ev}${dtxt?` · ${dtxt}`:''}</s>
      <i>Deadline</i><s>${dl}</s>
      <i>Place</i><s>${f.country}</s>
      <i>Type</i><s>${(f.cats||'').replace(/\|/g,' · ')||'—'}</s>
    </div>${warn}${prec}
    <a class="link" href="${f.url}" target="_blank" rel="noopener">open festival page ↗</a></div>`;
}

function render(){
  layer.clearLayers();
  const mx=maxDate(MODE);
  const q=document.getElementById('q').value.trim().toLowerCase();
  const cf=sel.value;
  const showInact=document.getElementById('showInactive').checked;
  let shown=0;
  DATA.forEach(f=>{
    if(f.lat==null) return;
    if(cf && f.country!==cf) return;
    if(q && !f.name.toLowerCase().includes(q)) return;
    if(HORIZON!=null){
      const days = f.start ? Math.round((new Date(f.start+'T00:00:00')-TODAY)/DAY) : null;
      if(days==null || days<0 || days>HORIZON) return;
    }
    const inactive = !f._active || (MODE==='deadline' && !f.deadline);
    if(inactive && !showInact) return;
    shown++;
    const col = inactive ? '#5b6472' : color(f,MODE,mx);
    const m=L.circleMarker([f.lat,f.lon],{
      radius: inactive?4:6, color:'rgba(255,255,255,.55)', weight:.7,
      fillColor:col, fillOpacity: inactive?.4:.85
    });
    const tipDate = (MODE==='start'?f.start:f.deadline);
    m.bindTooltip(`${f.name} · ${tipDate?fmtShort(tipDate):'—'}`,{direction:'top',offset:[0,-4]});
    m.bindPopup(popup(f),{maxWidth:300});
    m.on('mouseover',()=>m.setStyle({weight:1.6,radius:inactive?5:8}));
    m.on('mouseout',()=>m.setStyle({weight:.7,radius:inactive?4:6}));
    layer.addLayer(m);
  });
  // legend + count
  document.getElementById('legmin').textContent=fmtShort(TODAY.toISOString().slice(0,10));
  document.getElementById('legmax').textContent=fmtShort(new Date(mx).toISOString().slice(0,10));
  document.getElementById('legmode').textContent= MODE==='start'?'festival date':'submission deadline';
  document.getElementById('count').innerHTML=`<b>${shown}</b> / ${DATA.length} shown`;
}

document.querySelectorAll('#mode button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('#mode button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); MODE=b.dataset.m; render();
});
document.querySelectorAll('#horizon button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('#horizon button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); HORIZON = b.dataset.d ? +b.dataset.d : null; render();
});
document.getElementById('q').oninput=render;
sel.onchange=render;
document.getElementById('showInactive').onchange=render;
render();
</script>
</body>
</html>
